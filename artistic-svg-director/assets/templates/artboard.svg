<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Пустой художественный холст SVG</title>
  <desc id="desc">Безопасный стартовый холст с фоном, направляющими слоями и внутренними определениями.</desc>
  <defs>
    <linearGradient id="backgroundGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#132033"/>
      <stop offset="0.55" stop-color="#223b56"/>
      <stop offset="1" stop-color="#0e1726"/>
    </linearGradient>
    <radialGradient id="focusGlow" cx="50%" cy="42%" r="55%">
      <stop offset="0" stop-color="#fff4c7" stop-opacity="0.75"/>
      <stop offset="0.45" stop-color="#8bd3ff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#132033" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>
  <g id="background">
    <rect width="1200" height="800" fill="url(#backgroundGradient)"/>
    <rect width="1200" height="800" fill="url(#focusGlow)"/>
  </g>
  <g id="composition-guides" opacity="0.18" fill="none" stroke="#ffffff" stroke-width="2">
    <path d="M200 120 C420 60 780 60 1000 120"/>
    <path d="M140 660 C420 560 780 560 1060 660"/>
    <circle cx="600" cy="390" r="190"/>
  </g>
  <g id="safe-focus-placeholder">
    <ellipse cx="600" cy="430" rx="180" ry="44" fill="#06111f" opacity="0.35" filter="url(#softBlur)"/>
    <circle cx="600" cy="360" r="96" fill="#8bd3ff" opacity="0.18"/>
    <path d="M520 430 C550 310 650 310 680 430 Z" fill="#f6d78a" opacity="0.82"/>
    <path d="M540 430 C570 350 630 350 660 430" fill="none" stroke="#fff4c7" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
